<!DOCTYPE html>
<html>
<head>
    <title>Scouting App - Start Here</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        a {
            text-decoration: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Scouting App</h1>
        <p>Click the button below to open the application:</p>
        <a href="http://localhost:8080/scoutingapp/" target="_blank">
            <button>Open Scouting App</button>
        </a>
        <p style="margin-top: 30px; font-size: 14px; color: #999;">
            Note: Make sure Tomcat is running before opening the app.
        </p>
    </div>
</body>
</html>
